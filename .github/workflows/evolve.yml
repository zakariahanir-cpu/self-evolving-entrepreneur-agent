name: Self-Evolving Agent Loop

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install groq duckduckgo-search

      - name: Run Agent Cycle
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python core.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "agent@self-evolving.ai"
          git config --local user.name "Self-Evolving Agent"
          git add .
          git commit -m "Agent Auto-Update: Business Evolution" || echo "No changes to commit"
          git push

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  
