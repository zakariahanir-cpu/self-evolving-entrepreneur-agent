name: Self-Evolving Agent Loop

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          # تحديث نظام الحزم وتثبيت أداة nmap الأساسية
          sudo apt-get update && sudo apt-get install -y nmap
          
          # تثبيت المكتبات الافتراضية ومكتبة nmap للبايثون
          pip install groq ddgs python-nmap --no-cache-dir
          
          # تثبيت المكتبات الجديدة التي استدعاها الوكيل في كود الـ NLP (رقم 93)
          pip install torch transformers scikit-learn --no-cache-dir

      - name: Run Agent Cycle
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python core.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "agent@self-evolving.ai"
          git config --local user.name "Self-Evolving Agent"
          git add .
          git commit -m "Agent Auto-Update: Fix Search and Evolve" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  
